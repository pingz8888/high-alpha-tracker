<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Alpha Tracker</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=192&h=192&fit=crop">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { 
            background-color: #000000; color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
        }
        .ios-glass { 
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.5s ease;
        }
        
        /* PRICE ALERTS */
        .alert-target { border-color: rgba(16, 185, 129, 0.8) !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .alert-stop { border-color: rgba(244, 63, 94, 0.8) !important; box-shadow: 0 0 20px rgba(244, 63, 94, 0.3); }
        
        ::-webkit-scrollbar { display: none; }
        #splash-screen { position: fixed; inset: 0; background-color: #000000; z-index: 50; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s; }
        #auth-screen { position: fixed; inset: 0; background-color: #000000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col pb-6 px-4 pt-6">

    <div id="auth-screen">
        <h2 class="text-xl font-black text-white mb-6 tracking-widest uppercase italic">Alpha Terminal</h2>
        <input type="password" id="masterKeyInput" placeholder="Master Key" class="w-full max-w-xs bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-center text-white focus:outline-none focus:border-blue-600 mb-4">
        <button onclick="unlockApp()" class="w-full max-w-xs bg-blue-600 text-white px-5 py-3 rounded-xl font-black uppercase text-xs tracking-widest active:scale-95 transition-all">Connect</button>
    </div>

    <div id="splash-screen">
        <div class="text-blue-500 text-[10px] font-black tracking-[0.3em] uppercase animate-pulse italic">Syncing Alpha v3...</div>
    </div>

    <header class="mb-4">
        <div class="flex justify-between items-end mb-1">
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">Alpha v3</h1>
            <div id="last-sync" class="text-[9px] font-mono text-slate-600 bg-white/5 px-2 py-1 rounded uppercase tracking-tighter border border-white/5">Waiting...</div>
        </div>
        <div class="flex gap-2 mt-4">
            <input type="text" id="newTicker" placeholder="TICKER" class="w-full bg-slate-900/50 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold text-white uppercase focus:outline-none">
            <button onclick="addStock()" class="bg-blue-600 text-white px-5 py-3 rounded-xl font-black text-[10px] uppercase active:scale-95">Add</button>
        </div>
    </header>

    <section class="flex-1 overflow-y-auto space-y-3 pb-4" id="stock-grid"></section>

    <div class="space-y-3 mt-4">
        <div id="ai-recommendations" class="ios-glass p-5 rounded-2xl text-xs font-mono leading-relaxed hidden border-l-4 border-emerald-500 text-slate-100 shadow-2xl"></div>
        <button onclick="fetchRecommendations()" class="ios-glass active:bg-slate-800 w-full py-4 rounded-2xl flex flex-col items-center justify-center">
            <span class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">Global Alpha Scan</span>
        </button>
    </div>

    <script>
        let watchlist = JSON.parse(localStorage.getItem('alphaWatchlist')) || ['SE', 'AAPL', 'D05.SI'];
        let savedKey = localStorage.getItem('appMasterKey');
        let priceLevels = JSON.parse(localStorage.getItem('alphaLevels')) || {};

        function saveWatchlist() { localStorage.setItem('alphaWatchlist', JSON.stringify(watchlist)); }
        function saveLevels() { localStorage.setItem('alphaLevels', JSON.stringify(priceLevels)); }

        document.addEventListener('DOMContentLoaded', () => {
            renderUI();
            if (savedKey) {
                document.getElementById('auth-screen').style.display = 'none';
                fetchAllData();
            } else {
                document.getElementById('splash-screen').style.display = 'none';
            }
        });

        function unlockApp() {
            const pin = document.getElementById('masterKeyInput').value;
            if (pin) {
                savedKey = pin;
                localStorage.setItem('appMasterKey', savedKey);
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('splash-screen').style.display = 'flex';
                fetchAllData();
            }
        }

        function handleAuthFailure() {
            localStorage.removeItem('appMasterKey');
            location.reload();
        }

        function addStock() {
            const input = document.getElementById('newTicker');
            const ticker = input.value.trim().toUpperCase();
            if (ticker && !watchlist.includes(ticker)) {
                watchlist.push(ticker);
                saveWatchlist();
                input.value = '';
                renderUI();
                fetchAllData();
            }
        }

        function removeStock(ticker) {
            watchlist = watchlist.filter(t => t !== ticker);
            delete priceLevels[ticker];
            saveWatchlist(); saveLevels(); renderUI();
        }

        function renderUI() {
            const grid = document.getElementById('stock-grid');
            grid.innerHTML = watchlist.map(ticker => `
                <div class="flex flex-col gap-1">
                    <div id="card-${ticker}" class="ios-glass p-4 rounded-xl flex justify-between items-center relative z-10">
                        <div class="flex flex-col">
                            <h3 class="text-lg font-black text-white tracking-tighter uppercase italic">${ticker}</h3>
                            <span id="name-${ticker}" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-[-2px]">Syncing...</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-md font-mono font-bold text-emerald-400" id="price-${ticker}">--</span>
                            <button onclick="removeStock('${ticker}')" class="text-slate-800 active:text-rose-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="3" stroke-linecap="round"/></svg></button>
                        </div>
                    </div>
                    <div id="insight-${ticker}" class="mx-2 p-3 bg-white/5 border border-white/5 rounded-b-xl text-[11px] leading-snug text-slate-300 hidden -mt-2 pt-4 transition-all italic font-medium">
                        <span class="animate-pulse text-blue-500 font-bold uppercase text-[9px]">Analyzing Setup...</span>
                    </div>
                </div>
            `).join('');
        }

        async function fetchAllData() {
            if (watchlist.length === 0) return removeSplashScreen();
            await fetchPrices();
            await fetchWatchlistInsights();
            removeSplashScreen();
        }

        async function fetchPrices() {
            try {
                const response = await fetch(`/.netlify/functions/getStocks?symbols=${watchlist.join(',')}`, {
                    headers: { 'x-app-password': savedKey }
                });
                if (response.status === 401) return handleAuthFailure();
                const data = await response.json();
                
                watchlist.forEach(ticker => {
                    const priceEl = document.getElementById(`price-${ticker}`);
                    const nameEl = document.getElementById(`name-${ticker}`);
                    const cardEl = document.getElementById(`card-${ticker}`);
                    
                    if (data[ticker]) {
                        const cur = parseFloat(data[ticker].price);
                        priceEl.innerText = `$${cur.toFixed(2)}`;
                        nameEl.innerText = data[ticker].name || ticker;
                        
                        if (priceLevels[ticker]) {
                            const { target, stop } = priceLevels[ticker];
                            cardEl.classList.remove('alert-target', 'alert-stop');
                            if (cur >= target) cardEl.classList.add('alert-target');
                            else if (cur <= stop) cardEl.classList.add('alert-stop');
                        }
                    }
                });
                const now = new Date();
                document.getElementById('last-sync').innerText = `Sync: ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            } catch (error) { console.error("Price fetch failed"); }
        }

        async function fetchWatchlistInsights() {
            watchlist.forEach(t => document.getElementById(`insight-${t}`).classList.remove('hidden'));
            try {
                const response = await fetch('/.netlify/functions/getInsights', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'x-app-password': savedKey },
                    body: JSON.stringify({ tickers: watchlist }) 
                });
                const data = await response.json(); 
                
                if (data.insights) {
                    watchlist.forEach(ticker => {
                        const insightEl = document.getElementById(`insight-${ticker}`);
                        if (data.insights[ticker]) {
                            insightEl.innerHTML = data.insights[ticker].replace(/\[KEEP\]/g, '<span class="text-emerald-400 font-bold">KEEP</span>')
                                                                        .replace(/\[SELL\]/g, '<span class="text-rose-400 font-bold">SELL</span>')
                                                                        .replace(/\[WATCH\]/g, '<span class="text-blue-400 font-bold">WATCH</span>');
                            
                            const targetMatch = data.insights[ticker].match(/Target: (\d+\.?\d*)/);
                            const stopMatch = data.insights[ticker].match(/Stop: (\d+\.?\d*)/);
                            if (targetMatch || stopMatch) {
                                priceLevels[ticker] = {
                                    target: targetMatch ? parseFloat(targetMatch[1]) : 999999,
                                    stop: stopMatch ? parseFloat(stopMatch[1]) : 0
                                };
                                saveLevels();
                            }
                        }
                    });
                    fetchPrices();
                }
            } catch (error) { console.error("AI Insight failed"); }
        }

        function removeSplashScreen() {
            const splash = document.getElementById('splash-screen');
            if (splash) setTimeout(() => { splash.style.opacity = '0'; setTimeout(() => { splash.style.display = 'none'; }, 500); }, 500);
        }

        async function fetchRecommendations() {
            const box = document.getElementById('ai-recommendations');
            box.classList.remove('hidden');
            box.innerHTML = '<div class="py-4 text-center animate-pulse text-[10px] font-black text-emerald-500 uppercase tracking-widest">Scanning Global Alpha...</div>';
            try {
                const response = await fetch('/.netlify/functions/getRecommendations', {
                    headers: { 'x-app-password': savedKey }
                });
                const data = await response.json(); 
                box.innerHTML = data.recommendations.replace(/\n/g, '<br>');
            } catch (error) { box.innerHTML = `Error: ${error.message}`; }
        }
    </script>
</body>
</html>
